    <!-- Cuerpo del monitor -->
    <rect x="0" y="0" width="64" height="44" rx="5" fill="#0c1218" stroke="#5b8aa6" stroke-width="2">
      <animate attributeName="stroke" values="#5b8aa6;#5b8aa6;#93bd22;#93bd22;#5b8aa6" keyTimes="0;0.80;0.86;0.97;1" dur="2.4s" begin="0.3s" repeatCount="indefinite"/>
    </rect>
    <!-- Pantalla -->
