    <rect x="20" y="51" width="24" height="3.5" rx="1.5" fill="#5b8aa6"/>
  </g>
  <g transform="translate(668,264)">
    <!-- Cuerpo del monitor -->
    <rect x="0" y="0" width="64" height="44" rx="5" fill="#0c1218" stroke="#5b8aa6" stroke-width="2">
      <animate attributeName="stroke" values="#5b8aa6;#5b8aa6;#93bd22;#93bd22;#5b8aa6" keyTimes="0;0.80;0.86;0.97;1" dur="2.4s" begin="0.45s" repeatCount="indefinite"/>
    </rect>
    <!-- Pantalla -->
    <rect x="6" y="6" width="52" height="32" rx="2.5" fill="#0a0f14">
      <animate attributeName="fill" values="#0a0f14;#0a0f14;#1a2e0a;#1a2e0a;#0a0f14" keyTimes="0;0.80;0.86;0.97;1" dur="2.4s" begin="0.45s" repeatCount="indefinite"/>
    </rect>
    <!-- Check de "orden recibida" que aparece al iluminarse -->
    <path d="M22 22 l5 5 l11 -11" fill="none" stroke="#93bd22" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.83;0.88;0.97;1" dur="2.4s" begin="0.45s" repeatCount="indefinite"/>
    </path>
    <!-- Peana -->
    <rect x="26" y="44" width="12" height="7" fill="#5b8aa6"/>
    <rect x="20" y="51" width="24" height="3.5" rx="1.5" fill="#5b8aa6"/>
  </g>
  <g transform="translate(528,384)">
    <!-- Cuerpo del monitor -->
    <rect x="0" y="0" width="64" height="44" rx="5" fill="#0c1218" stroke="#5b8aa6" stroke-width="2">
      <animate attributeName="stroke" values="#5b8aa6;#5b8aa6;#93bd22;#93bd22;#5b8aa6" keyTimes="0;0.80;0.86;0.97;1" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
    <!-- Pantalla -->
    <rect x="6" y="6" width="52" height="32" rx="2.5" fill="#0a0f14">
      <animate attributeName="fill" values="#0a0f14;#0a0f14;#1a2e0a;#1a2e0a;#0a0f14" keyTimes="0;0.80;0.86;0.97;1" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
    <!-- Check de "orden recibida" que aparece al iluminarse -->
    <path d="M22 22 l5 5 l11 -11" fill="none" stroke="#93bd22" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.83;0.88;0.97;1" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
    </path>
    <!-- Peana -->
    <rect x="26" y="44" width="12" height="7" fill="#5b8aa6"/>
    <rect x="20" y="51" width="24" height="3.5" rx="1.5" fill="#5b8aa6"/>
  </g>
  <g transform="translate(668,384)">
    <!-- Cuerpo del monitor -->
    <rect x="0" y="0" width="64" height="44" rx="5" fill="#0c1218" stroke="#5b8aa6" stroke-width="2">
      <animate attributeName="stroke" values="#5b8aa6;#5b8aa6;#93bd22;#93bd22;#5b8aa6" keyTimes="0;0.80;0.86;0.97;1" dur="2.4s" begin="0.75s" repeatCount="indefinite"/>
    </rect>
    <!-- Pantalla -->
    <rect x="6" y="6" width="52" height="32" rx="2.5" fill="#0a0f14">
      <animate attributeName="fill" values="#0a0f14;#0a0f14;#1a2e0a;#1a2e0a;#0a0f14" keyTimes="0;0.80;0.86;0.97;1" dur="2.4s" begin="0.75s" repeatCount="indefinite"/>
    </rect>
    <!-- Check de "orden recibida" que aparece al iluminarse -->
    <path d="M22 22 l5 5 l11 -11" fill="none" stroke="#93bd22" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.83;0.88;0.97;1" dur="2.4s" begin="0.75s" repeatCount="indefinite"/>
    </path>
    <!-- Peana -->
