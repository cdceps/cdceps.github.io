      <animate attributeName="stroke" values="#5b8aa6;#5b8aa6;#93bd22;#93bd22;#5b8aa6" keyTimes="0;0.80;0.86;0.97;1" dur="2.4s" begin="0.9s" repeatCount="indefinite"/>
